<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المشرف — اختبار التثبيت</title>
<style>
  :root{
    --p:#6C3483;--ps:#9B59B6;--pl:#D7BDE2;--a:#E67E22;
    --g:#1E8449;--gs:#27AE60;--r:#C0392B;--rs:#E74C3C;
    --bg:#F0EBF8;--card:#fff;--tx:#1a1a2e;--txl:#555;
    --brd:#ddd;--rad:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:var(--card);border-radius:20px;padding:32px 28px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(108,52,131,.15);text-align:center}
  .login-card .icon{font-size:56px;margin-bottom:12px}
  .login-card h1{font-size:22px;font-weight:800;color:var(--p);margin-bottom:6px}
  .login-card p{font-size:14px;color:var(--txl);margin-bottom:22px}
  .login-card input{width:100%;padding:14px;border:2px solid var(--brd);border-radius:12px;font-size:20px;text-align:center;letter-spacing:6px;font-family:monospace;margin-bottom:12px}
  .login-card input:focus{outline:none;border-color:var(--p)}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;transition:.15s}
  .btn-p{background:linear-gradient(135deg,var(--p),var(--ps));color:#fff}
  .btn-r{background:linear-gradient(135deg,var(--r),var(--rs));color:#fff;margin-top:8px}
  .btn-g{background:linear-gradient(135deg,var(--g),var(--gs));color:#fff;margin-top:8px}
  .err{color:var(--r);font-size:14px;margin-top:8px;display:none}

  /* DASHBOARD */
  .dash{display:none}
  .hdr{background:linear-gradient(135deg,var(--p),var(--ps));color:#fff;padding:16px 20px}
  .hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .hdr h1{font-size:20px;font-weight:800}
  .hdr-sub{font-size:13px;opacity:.85}
  .hdr-logout{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer}

  /* STATS BAR */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px;max-width:900px;margin:0 auto}
  .stat-card{background:var(--card);border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .stat-num{font-size:28px;font-weight:900;margin-bottom:2px}
  .stat-lbl{font-size:12px;color:var(--txl)}
  .stat-total .stat-num{color:var(--p)}
  .stat-done .stat-num{color:#2980b9}
  .stat-pass .stat-num{color:var(--g)}
  .stat-fail .stat-num{color:var(--r)}

  /* CONTROLS */
  .controls{padding:0 16px 12px;max-width:900px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .search-box{flex:1;min-width:160px;padding:10px 14px;border:1.5px solid var(--brd);border-radius:10px;font-size:15px;font-family:inherit;background:#fff}
  .search-box:focus{outline:none;border-color:var(--p)}
  .filter-btn{padding:9px 14px;border:1.5px solid var(--brd);border-radius:10px;background:#fff;font-size:14px;font-family:inherit;cursor:pointer;transition:.15s}
  .filter-btn.active{background:var(--p);color:#fff;border-color:var(--p)}
  .reset-btn{padding:9px 14px;border:1.5px solid var(--r);border-radius:10px;background:#fff;color:var(--r);font-size:14px;font-family:inherit;cursor:pointer}
  .reset-btn:hover{background:#fadbd8}

  /* LIVE INDICATOR */
  .live-bar{padding:6px 16px;max-width:900px;margin:0 auto 4px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txl)}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--g);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* TABLE */
  .tbl-wrap{padding:0 16px 30px;max-width:900px;margin:0 auto}
  .tbl{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--rad);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}
  .tbl th{background:linear-gradient(135deg,var(--p),var(--ps));color:#fff;padding:12px 14px;font-size:14px;font-weight:700;text-align:right;white-space:nowrap}
  .tbl td{padding:12px 14px;font-size:14px;border-bottom:1px solid #f0eaf8;vertical-align:top}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr:hover td{background:#faf5ff}
  .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap}
  .badge-pass{background:#d5f5e3;color:var(--g)}
  .badge-fail{background:#fadbd8;color:var(--r)}
  .badge-pending{background:#fef9e7;color:#d4ac0d}
  .score-bar{width:100%;background:#eee;border-radius:6px;height:6px;margin-top:4px;overflow:hidden}
  .score-fill{height:100%;border-radius:6px}
  .score-fill.pass{background:var(--g)}
  .score-fill.fail{background:var(--r)}
  .wrong-detail{margin-top:6px}
  .wrong-chip{display:inline-block;background:#fadbd8;color:var(--r);border-radius:6px;padding:2px 7px;font-size:12px;margin:2px 2px 0 0}
  .expand-btn{background:none;border:1px solid var(--brd);border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;color:var(--txl);margin-top:4px}
  .expand-row{display:none;background:#fff8f8}
  .expand-row td{padding:10px 14px}
  .wrong-full-item{padding:6px 0;border-bottom:1px solid #fce;font-size:13px}
  .wrong-full-item:last-child{border:none}

  /* EMPTY STATE */
  .empty{text-align:center;padding:50px 20px;color:var(--txl)}
  .empty .big{font-size:48px;margin-bottom:12px}
  .empty p{font-size:15px}

  /* LOADING */
  .loading-dash{text-align:center;padding:60px;color:var(--txl)}
  .spinner{width:40px;height:40px;border:4px solid var(--pl);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* MOBILE */
  @media(max-width:600px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .tbl th:nth-child(5),.tbl td:nth-child(5){display:none}
    .hdr h1{font-size:17px}
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="icon">🔐</div>
    <h1>لوحة المشرف</h1>
    <p>اختبار التثبيت — ٢٠٢٦<br>أدخل رمز الدخول للمشرفين</p>
    <input type="password" id="pin-input" placeholder="••••" maxlength="6" onkeydown="if(event.key==='Enter')LOGIN()">
    <button class="btn btn-p" onclick="LOGIN()">دخول</button>
    <div class="err" id="pin-err">رمز غير صحيح. حاول مجدداً.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="hdr">
    <div class="hdr-top">
      <h1>📊 لوحة المشرف — اختبار التثبيت</h1>
      <button class="hdr-logout" onclick="LOGOUT()">خروج</button>
    </div>
    <div class="hdr-sub" id="hdr-time">جارٍ التحديث...</div>
  </div>

  <div class="stats">
    <div class="stat-card stat-total"><div class="stat-num" id="st-total">٠</div><div class="stat-lbl">إجمالي المشاركين</div></div>
    <div class="stat-card stat-done"><div class="stat-num" id="st-done">٠</div><div class="stat-lbl">أنهوا الاختبار</div></div>
    <div class="stat-card stat-pass"><div class="stat-num" id="st-pass">٠</div><div class="stat-lbl">ناجح ✅</div></div>
    <div class="stat-card stat-fail"><div class="stat-num" id="st-fail">٠</div><div class="stat-lbl">راسب ❌</div></div>
  </div>

  <div class="controls">
    <input type="text" class="search-box" id="search" placeholder="🔍 ابحث باسم الطالب..." oninput="RENDER()">
    <button class="filter-btn active" id="f-all" onclick="FILTER('all')">الكل</button>
    <button class="filter-btn" id="f-pass" onclick="FILTER('pass')">الناجحون</button>
    <button class="filter-btn" id="f-fail" onclick="FILTER('fail')">الراسبون</button>
    <button class="reset-btn" onclick="RESET_CONFIRM()">🗑️ مسح النتائج</button>
  </div>

  <div class="live-bar">
    <div class="live-dot"></div>
    <span>تحديث فوري — يتم استقبال النتائج تلقائياً</span>
  </div>

  <div class="tbl-wrap" id="tbl-wrap">
    <div class="loading-dash"><div class="spinner"></div><p>جارٍ تحميل النتائج...</p></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ═══════════════════════════════════════════════
// FIREBASE CONFIG — Same config as quiz page
// ═══════════════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyDSCMq1feMv_MvN835UEngrE-WNnGCvVjs",
    authDomain: "confirmation-quiz.firebaseapp.com",
    databaseURL: "https://confirmation-quiz-default-rtdb.firebaseio.com",
    projectId: "confirmation-quiz",
    storageBucket: "confirmation-quiz.firebasestorage.app",
    messagingSenderId: "348085458461",
    appId: "1:348085458461:web:ef81a4badd8b5e534218f4"
  };

const app = initializeApp(FB_CONFIG);
const db = getDatabase(app);
const resultsRef = ref(db, 'quiz_results');

// Listen for real-time updates
onValue(resultsRef, (snapshot) => {
  const data = snapshot.val();
  const list = data ? Object.entries(data).map(([k,v])=>({...v, _key:k})) : [];
  window._results = list;
  window._db_ref = ref;
  window._db = db;
  RENDER();
  UpdateStats(list);
  UpdateTime();
});

window._remove = remove;
window._db_ref_fn = ref;
window._db_inst = db;
</script>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SUPERVISOR_PIN = '2026'; // Change this to your desired PIN
let currentFilter = 'all';
window._results = [];

// Arabic numeral helper
function AR(n){ return String(n).replace(/\d/g, d=>'٠١٢٣٤٥٦٧٨٩'[d]); }
function $(id){ return document.getElementById(id); }

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
function LOGIN(){
  const pin = $('pin-input').value.trim();
  if(pin === SUPERVISOR_PIN){
    $('login-wrap').style.display = 'none';
    $('dash').style.display = 'block';
    $('pin-err').style.display = 'none';
  } else {
    $('pin-err').style.display = 'block';
    $('pin-input').value = '';
    $('pin-input').focus();
  }
}

function LOGOUT(){
  $('dash').style.display = 'none';
  $('login-wrap').style.display = 'flex';
  $('pin-input').value = '';
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function UpdateStats(list){
  const pass = list.filter(r=>r.pass).length;
  const fail = list.filter(r=>!r.pass).length;
  $('st-total').textContent = AR(list.length);
  $('st-done').textContent = AR(list.length);
  $('st-pass').textContent = AR(pass);
  $('st-fail').textContent = AR(fail);
}

function UpdateTime(){
  const now = new Date();
  const t = now.toLocaleTimeString('ar-SA', {hour:'2-digit',minute:'2-digit'});
  $('hdr-time').textContent = 'آخر تحديث: ' + t;
}

// ═══════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════
function FILTER(f){
  currentFilter = f;
  ['all','pass','fail'].forEach(x=>{
    $('f-'+x).classList.toggle('active', x===f);
  });
  RENDER();
}

// ═══════════════════════════════════════════
// RENDER TABLE
// ═══════════════════════════════════════════
function RENDER(){
  const search = ($('search')||{value:''}).value.trim().toLowerCase();
  let list = window._results || [];

  // Filter
  if(currentFilter === 'pass') list = list.filter(r=>r.pass);
  if(currentFilter === 'fail') list = list.filter(r=>!r.pass);
  if(search) list = list.filter(r=>(r.name||'').toLowerCase().includes(search));

  // Sort by timestamp desc
  list.sort((a,b)=> new Date(b.timestamp||0) - new Date(a.timestamp||0));

  const wrap = $('tbl-wrap');

  if(list.length === 0){
    wrap.innerHTML = `<div class="empty"><div class="big">⏳</div><p>${
      (window._results||[]).length === 0
        ? 'في انتظار مشاركة الطلاب...<br><span style="font-size:13px">ستظهر النتائج هنا فور إنهاء أي طالب الاختبار</span>'
        : 'لا توجد نتائج مطابقة للفلتر المحدد'
    }</p></div>`;
    return;
  }

  let rows = list.map((r, idx) => {
    const pct = r.pct || 0;
    const score = (r.score||0) + ' / ' + (r.total||15);
    const passClass = r.pass ? 'pass' : 'fail';
    const badge = r.pass
      ? '<span class="badge badge-pass">✅ ناجح</span>'
      : '<span class="badge badge-fail">❌ راسب</span>';

    const wqs = r.wrongQuestions || [];
    const wrongCount = wqs.length;
    const wrongChips = wqs.slice(0,3).map(w=>`<span class="wrong-chip">س${w.num}</span>`).join('');
    const moreChip = wrongCount > 3 ? `<span class="wrong-chip">+${wrongCount-3}</span>` : '';

    const timeStr = r.timestamp ? new Date(r.timestamp).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}) : '—';

    const expandId = 'exp-' + idx;
    const expandRowId = 'exp-row-' + idx;

    const wrongDetails = wqs.length > 0
      ? wqs.map(w=>`
          <div class="wrong-full-item">
            <strong>س${w.num}: ${w.q}</strong><br>
            إجابة الطالب: <span style="color:var(--r)">${w.chosen||'—'}</span><br>
            الإجابة الصحيحة: <span style="color:var(--g);font-weight:700">${w.correct||'—'}</span>
          </div>`).join('')
      : '<p style="color:var(--g);font-size:13px">أجاب على جميع الأسئلة بشكل صحيح! 🎉</p>';

    return `
      <tr>
        <td><strong>${r.name||'—'}</strong></td>
        <td>
          <div style="font-weight:700">${score}</div>
          <div class="score-bar"><div class="score-fill ${passClass}" style="width:${pct}%"></div></div>
          <div style="font-size:12px;color:var(--txl);margin-top:2px">${pct}%</div>
        </td>
        <td>${badge}</td>
        <td>
          ${wrongChips}${moreChip}
          ${wqs.length > 0 ? `<br><button class="expand-btn" id="${expandId}" onclick="EXPAND(${idx})">${wqs.length} أسئلة خاطئة ▼</button>` : '<span style="color:var(--g);font-size:13px">لا أخطاء 🎉</span>'}
        </td>
        <td style="font-size:13px;color:var(--txl)">${timeStr}</td>
      </tr>
      <tr class="expand-row" id="${expandRowId}">
        <td colspan="5">
          <div style="padding:4px 0">${wrongDetails}</div>
        </td>
      </tr>`;
  }).join('');

  wrap.innerHTML = `
    <table class="tbl">
      <thead>
        <tr>
          <th>اسم الطالب</th>
          <th>النتيجة</th>
          <th>الحالة</th>
          <th>الأخطاء</th>
          <th>الوقت</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function EXPAND(idx){
  const row = $('exp-row-' + idx);
  const btn = $('exp-' + idx);
  if(!row) return;
  const open = row.style.display === 'table-row';
  row.style.display = open ? 'none' : 'table-row';
  if(btn) btn.textContent = open
    ? (btn.textContent.replace('▲','▼'))
    : (btn.textContent.replace('▼','▲'));
}

// ═══════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════
function RESET_CONFIRM(){
  if(confirm('هل أنت متأكد من حذف جميع نتائج الاختبار؟\nهذا الإجراء لا يمكن التراجع عنه.')){
    if(window._remove && window._db_inst && window._db_ref_fn){
      const r = window._db_ref_fn(window._db_inst, 'quiz_results');
      window._remove(r).then(()=>{
        window._results = [];
        RENDER();
        UpdateStats([]);
      });
    }
  }
}
</script>
</body>
</html>
