<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>اختبار التثبيت</title>
<style>
  :root {
    --p:#6C3483;--ps:#9B59B6;--pl:#D7BDE2;--a:#E67E22;--as:#F39C12;
    --g:#1E8449;--r:#C0392B;--bg:#F8F4FC;--card:#fff;
    --tx:#1a1a2e;--txl:#555;--brd:#e0d0f0;--rad:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:40px}
  /* HEADER */
  .hdr{background:linear-gradient(135deg,var(--p),var(--ps));color:#fff;padding:18px 20px 22px;text-align:center;position:relative}
  .hdr h1{font-size:22px;font-weight:800;margin-bottom:4px}
  .hdr p{font-size:14px;opacity:.85}
  /* SCREENS */
  .scr{display:none;padding:20px;max-width:600px;margin:0 auto}
  .scr.active{display:block}
  /* CARD */
  .card{background:var(--card);border-radius:var(--rad);padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(108,52,131,.08);border:1px solid var(--brd)}
  /* NAME SCREEN */
  .welcome-icon{font-size:60px;text-align:center;margin:20px 0 10px}
  .welcome-title{font-size:22px;font-weight:800;text-align:center;color:var(--p);margin-bottom:8px}
  .welcome-sub{font-size:15px;color:var(--txl);text-align:center;margin-bottom:24px;line-height:1.6}
  label{display:block;font-size:15px;font-weight:700;color:var(--p);margin-bottom:8px}
  input[type=text]{width:100%;padding:14px 16px;border:2px solid var(--brd);border-radius:12px;font-size:17px;font-family:inherit;color:var(--tx);background:#fafafa;transition:.2s;text-align:right}
  input[type=text]:focus{outline:none;border-color:var(--p);background:#fff}
  .btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;transition:.15s;margin-top:12px}
  .btn-primary{background:linear-gradient(135deg,var(--p),var(--ps));color:#fff}
  .btn-primary:active{transform:scale(.97)}
  .btn-primary:disabled{opacity:.5;cursor:default}
  /* QUIZ SCREEN */
  .q-progress-bar{background:#e8d8f4;border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden}
  .q-progress-fill{background:linear-gradient(90deg,var(--p),var(--ps));height:100%;border-radius:20px;transition:.4s}
  .q-counter{font-size:13px;color:var(--txl);text-align:center;margin-bottom:16px}
  .q-card{background:var(--card);border-radius:var(--rad);padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(108,52,131,.1);border:2px solid var(--brd)}
  .q-emoji{font-size:32px;text-align:center;margin-bottom:10px}
  .q-text{font-size:18px;font-weight:700;color:var(--tx);text-align:center;margin-bottom:18px;line-height:1.5}
  .opt{display:block;width:100%;padding:14px 16px;margin-bottom:10px;border:2px solid var(--brd);border-radius:12px;background:#fafafa;font-size:16px;font-family:inherit;color:var(--tx);cursor:pointer;text-align:right;transition:.15s;line-height:1.4}
  .opt:active{transform:scale(.98)}
  .opt.selected{border-color:var(--p);background:#f0e8f8;font-weight:700}
  .opt.correct{border-color:var(--g);background:#d5f5e3;color:var(--g);font-weight:700}
  .opt.wrong{border-color:var(--r);background:#fadbd8;color:var(--r)}
  .q-feedback{background:#fff8e8;border:1px solid var(--as);border-radius:12px;padding:12px 14px;font-size:15px;color:#7D6608;line-height:1.6;margin-top:4px;display:none}
  .q-feedback.show{display:block}
  .nav-btns{display:flex;gap:10px;margin-top:4px}
  .btn-next{flex:1;padding:14px;border:none;border-radius:12px;background:var(--p);color:#fff;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;transition:.15s}
  .btn-next:disabled{opacity:.35;cursor:default}
  /* SUBMIT SCREEN */
  .submit-info{background:#f0e8f8;border-radius:12px;padding:14px;margin-bottom:16px;font-size:15px;color:var(--p);font-weight:700;text-align:center}
  /* RESULT SCREEN */
  .result-icon{font-size:70px;text-align:center;margin:10px 0}
  .result-score{font-size:48px;font-weight:900;text-align:center;color:var(--p);margin:8px 0}
  .result-label{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
  .pass-badge{background:linear-gradient(135deg,#1E8449,#27AE60);color:#fff;border-radius:12px;padding:12px 20px;text-align:center;font-size:20px;font-weight:800;margin-bottom:16px}
  .fail-badge{background:linear-gradient(135deg,#C0392B,#E74C3C);color:#fff;border-radius:12px;padding:12px 20px;text-align:center;font-size:20px;font-weight:800;margin-bottom:16px}
  .wrong-list{margin-top:4px}
  .wrong-item{background:#fadbd8;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:14px;color:#922B21;line-height:1.5}
  .wrong-item strong{display:block;margin-bottom:3px;font-size:15px}
  /* LOADING */
  .loading{text-align:center;padding:40px;color:var(--txl);font-size:16px}
  .spinner{width:36px;height:36px;border:4px solid var(--brd);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* ALREADY SUBMITTED */
  .already-done{text-align:center;padding:30px 20px}
  .already-done .big{font-size:50px;margin-bottom:12px}
  .already-done h2{font-size:20px;color:var(--p);margin-bottom:8px}
  .already-done p{font-size:15px;color:var(--txl);line-height:1.6}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <h1>🕊️ اختبار التثبيت</h1>
  <p>سرّ الميرون — تحضير ٢٠٢٦</p>
</div>

<!-- SCREEN 1: NAME ENTRY -->
<div class="scr active" id="scr-name">
  <div class="welcome-icon">✝️</div>
  <div class="welcome-title">أهلاً بك في اختبار التثبيت</div>
  <div class="welcome-sub">هذا الاختبار يتضمن <strong>١٥ سؤالاً</strong> حول الأسرار والروح القدس وسرّ التثبيت.<br>اقرأ كل سؤال بتمعّن وأجب بصدق.</div>
  <div class="card">
    <label for="student-name">اكتب اسمك الكامل</label>
    <input type="text" id="student-name" placeholder="مثال: مريم يوسف" autocomplete="off" oninput="CHK()">
    <button class="btn btn-primary" id="btn-start" disabled onclick="START()">ابدأ الاختبار ←</button>
  </div>
</div>

<!-- SCREEN 2: QUIZ -->
<div class="scr" id="scr-quiz">
  <div class="q-progress-bar"><div class="q-progress-fill" id="qpf" style="width:0%"></div></div>
  <div class="q-counter" id="qctr">السؤال ١ من ١٥</div>
  <div id="q-area"></div>
  <div class="nav-btns">
    <button class="btn-next" id="btn-next" disabled onclick="NEXT()">التالي ←</button>
  </div>
</div>

<!-- SCREEN 3: SUBMITTING -->
<div class="scr" id="scr-submit">
  <div class="loading">
    <div class="spinner"></div>
    <p>يتم حفظ إجاباتك...</p>
  </div>
</div>

<!-- SCREEN 4: RESULT -->
<div class="scr" id="scr-result">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-score" id="res-score"></div>
  <div class="result-label" id="res-label"></div>
  <div id="res-badge"></div>
  <div class="card" id="res-wrong-card" style="display:none">
    <h3 style="font-size:16px;color:var(--r);margin-bottom:10px">❌ الأسئلة التي تحتاج مراجعة:</h3>
    <div class="wrong-list" id="res-wrong-list"></div>
  </div>
  <div class="card" style="text-align:center;background:#d5f5e3;border-color:#1e8449">
    <p style="font-size:15px;color:var(--g);line-height:1.6">✅ تم حفظ نتيجتك. شكراً على مشاركتك في الاختبار!</p>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, push } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ═══════════════════════════════════════════════
// FIREBASE CONFIG — Replace with your own config
// ═══════════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyDSCMq1feMv_MvN835UEngrE-WNnGCvVjs",
    authDomain: "confirmation-quiz.firebaseapp.com",
    databaseURL: "https://confirmation-quiz-default-rtdb.firebaseio.com",
    projectId: "confirmation-quiz",
    storageBucket: "confirmation-quiz.firebasestorage.app",
    messagingSenderId: "348085458461",
    appId: "1:348085458461:web:ef81a4badd8b5e534218f4"
  };


const app = initializeApp(FB_CONFIG);
const db = getDatabase(app);
window._db = db;
window._ref = ref;
window._set = set;
window._push = push;
window._FB_READY = true;
</script>

<script>
// ═══════════════════════════════════════════
// QUIZ DATA — 15 Questions
// ═══════════════════════════════════════════
const QS = [
  {
    e:'🏛️',
    q:'كم عدد أسرار الكنيسة الكاثوليكية؟',
    o:['٥','٧','١٢','٣'],
    a:1,
    fb:'الأسرار السبعة: العماد، الإفخارستيا، التثبيت، التوبة، الزواج، الكهنوت، مسحة المرضى.'
  },
  {
    e:'🕊️',
    q:'ما هو سرّ التثبيت (الميرون)؟',
    o:['سرّ تناول جسد المسيح ودمه','سرّ ننال فيه هبة الروح القدس كاملاً ونُختم بختمه الأبدي','سرّ غفران الخطايا','سرّ الانتماء للكنيسة لأول مرة'],
    a:1,
    fb:'في التثبيت يمسح الأسقف جبهتنا بالميرون قائلاً: "اِقبل وَسم موهبة الروح القدس". هذا الختم يُكرّسنا شهوداً للمسيح إلى الأبد.'
  },
  {
    e:'🌊',
    q:'ما هي أسرار البداية المسيحية الثلاثة؟',
    o:['العماد والكهنوت والزواج','العماد والإفخارستيا والتثبيت','التوبة والمناولة والتثبيت','العماد والتوبة والزواج'],
    a:1,
    fb:'العماد يمنحنا الحياة الإلهية، الإفخارستيا تُغذّيها، والتثبيت يُنضجها ويجعلنا شهوداً كاملين للمسيح.'
  },
  {
    e:'✝️',
    q:'ماذا يقول الأسقف عند مسح جبهة المثبَّت بالميرون؟',
    o:['"خذ الروح القدس وكن قوياً"','"باسم الآب والابن والروح القدس"','"اِقبل وَسم موهبة الروح القدس"','"أنت الآن مسيحي كامل"'],
    a:2,
    fb:'هذه الكلمات تُعلن استقبال المثبَّت لختم الروح القدس الأبدي. وجواب المثبَّت يكون: "آمين."'
  },
  {
    e:'🙌',
    q:'ماذا يطلب الأسقف من طالب التثبيت قبل إعلان إيمانه؟',
    o:['أن يُصلّي صلاة خاصة','أن يكفر بالشيطان وبجميع أعماله ومُغرياته','أن يُقدّم هدية للكنيسة','أن يحفظ قانون الإيمان'],
    a:1,
    fb:'الأسقف يسأل: "أتَكفرون بالشيطان وبجميع أعماله ومُغرياته؟" — الطالب يُجيب: "نعم، نكفر." ثم يُعلن إيمانه بالثالوث.'
  },
  {
    e:'💬',
    q:'ما هو جواب المثبَّت بعد أن يقول الأسقف "السلام لك"؟',
    o:['"شكراً لك"','"ومع روحك أيضاً"','"آمين"','"نعم، أومن"'],
    a:1,
    fb:'الحوار الكامل: الأسقف: "اِقبل وَسم موهبة الروح القدس" — المثبَّت: "آمين." ثم الأسقف: "السلام لك" — المثبَّت: "ومع روحك أيضاً."'
  },
  {
    e:'🔐',
    q:'متى يُمحى ختم الروح القدس الذي ننال في التثبيت؟',
    o:['بعد ٧ سنوات','عند ارتكاب خطيئة كبيرة','لا يُمحى أبداً — هو ختم أبدي','عند الزواج'],
    a:2,
    fb:'ختم الروح القدس لا يُمحى أبداً. حتى لو ابتعدنا عن الله، يبقى هذا الختم شاهداً على أننا ننتمي للمسيح.'
  },
  {
    e:'📝',
    q:'ما الفرق الجوهري بين يوم المعمودية ويوم التثبيت فيما يخص الإيمان؟',
    o:['لا فرق بينهما','يوم المعمودية أجاب الآخرون عن الطفل — أما يوم التثبيت فالطالب يُجيب بنفسه بوعي وحرية','التثبيت يُلغي المعمودية','المعمودية أهم من التثبيت'],
    a:1,
    fb:'هذا الفرق الجوهري يجعل التثبيت نضجاً مسيحياً حقيقياً — أنت تختار إيمانك بنفسك وتُعلنه بصوتك أمام الكنيسة والأسقف!'
  },
  {
    e:'🔥',
    q:'بأي شكل ظهر الروح القدس على الرسل يوم العنصرة؟',
    o:['حمامة بيضاء','ماء متدفق','ألسنة نار وريح عاصفة','سحاب وضباب'],
    a:2,
    fb:'"ظهرت لهم ألسنة منقسمة كأنها من نار وجلست على كل واحد منهم" (أعمال ٢: ٣). النار ترمز لحرارة الإيمان وقوة الروح القدس.'
  },
  {
    e:'🎁',
    q:'كم عدد مواهب الروح القدس؟',
    o:['خمس','ست','سبع','تسع'],
    a:2,
    fb:'المواهب السبعة: الحكمة، الفهم، المشورة، القوة، العلم، التقوى، ومخافة الله — كما تنبّأ النبي إشعيا (١١: ٢-٣).'
  },
  {
    e:'🎁',
    q:'مَن تنبّأ عن مواهب الروح القدس السبعة؟',
    o:['داود النبي','موسى النبي','إشعيا النبي','إيليا النبي'],
    a:2,
    fb:'النبي إشعيا تنبّأ: "روح الحكمة والفهم والمشورة والقوة والعلم والتقوى ومخافة الله" (إشعيا ١١: ٢-٣).'
  },
  {
    e:'🍇',
    q:'كم عدد ثمار الروح القدس كما ذكرها بولس الرسول في رسالته للغلاطيين؟',
    o:['سبعة','ثمانية','تسعة','اثنا عشر'],
    a:2,
    fb:'التسعة ثمار: المحبة والفرح والسلام والصبر واللطف والصلاح والإيمان والوداعة والعفاف (غلاطية ٥: ٢٢-٢٣).'
  },
  {
    e:'🤍',
    q:'ما هي الخطوات الصحيحة لممارسة سرّ التوبة؟',
    o:['الاعتراف للكاهن فقط','فحص الضمير، الندم، العزم على عدم العودة، الاعتراف للكاهن','الصلاة الخاصة بدون كاهن تكفي','الاعتراف ثم فحص الضمير'],
    a:1,
    fb:'الترتيب الصحيح: فحص الضمير ← الندم الحقيقي ← العزم على التغيير ← الاعتراف للكاهن ← تنفيذ الكفارة.'
  },
  {
    e:'🍞',
    q:'في التحول الجوهري في القداس، ماذا يحدث للخبز والخمر؟',
    o:['يتغيّر شكلهما ولونهما','يصبح جسد المسيح ودمه الحقيقيين مع بقاء شكل الخبز والخمر','يُصبحان رمزاً للمسيح فقط','يختفيان تماماً'],
    a:1,
    fb:'معجزة في كل قداس: الجوهر يتحوّل (الخبز يصبح جسد المسيح، الخمر يصبح دمه) مع بقاء الشكل الخارجي.'
  },
  {
    e:'🌍',
    q:'ماذا يعني أن الإنسان يُجدّد عهود عماده يوم التثبيت؟',
    o:['يتعمّد من جديد','يُعيد الاعتراف عن كل ذنوبه','يُعلن إيمانه بنفسه بوعي وحرية كمسيحي ناضج','يبدأ حياة مسيحية جديدة كلياً'],
    a:2,
    fb:'يوم معموديتك كان الآخرون يُجيبون عنك كطفل. اليوم أنت تختار الله بنفسك، تكفر بالشيطان وتُعلن إيمانك — هذا هو قلب سرّ التثبيت!'
  }
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let studentName = '';
let curQ = 0;
let answers = new Array(15).fill(null); // index of chosen option
let answered = new Array(15).fill(false);

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function $(id){ return document.getElementById(id); }
function SHW(id){ document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); window.scrollTo(0,0); }

function CHK(){
  const v = $('student-name').value.trim();
  $('btn-start').disabled = v.length < 2;
}

function START(){
  studentName = $('student-name').value.trim();
  curQ = 0;
  answers = new Array(15).fill(null);
  answered = new Array(15).fill(false);
  SHW('scr-quiz');
  RenderQ();
}

function RenderQ(){
  const q = QS[curQ];
  const pct = (curQ / 15) * 100;
  $('qpf').style.width = pct + '%';
  $('qctr').textContent = 'السؤال ' + AR(curQ+1) + ' من ١٥';

  let html = `<div class="q-card">
    <div class="q-emoji">${q.e}</div>
    <div class="q-text">${q.q}</div>`;

  q.o.forEach((opt, i) => {
    let cls = 'opt';
    if(answered[curQ]){
      if(i === q.a) cls += ' correct';
      else if(i === answers[curQ] && answers[curQ] !== q.a) cls += ' wrong';
    } else if(answers[curQ] === i){
      cls += ' selected';
    }
    html += `<button class="${cls}" onclick="SEL(${i})">${opt}</button>`;
  });

  html += `<div class="q-feedback ${answered[curQ]?'show':''}" id="fb">${q.fb}</div>`;
  html += `</div>`;

  $('q-area').innerHTML = html;

  // Next button label
  const isLast = curQ === 14;
  $('btn-next').textContent = isLast ? 'إنهاء الاختبار ✓' : 'التالي ←';
  $('btn-next').disabled = answers[curQ] === null;
}

function SEL(i){
  if(answered[curQ]) return; // locked after reveal
  answers[curQ] = i;
  answered[curQ] = true;
  $('btn-next').disabled = false;
  RenderQ();
}

function NEXT(){
  if(curQ < 14){
    curQ++;
    RenderQ();
    window.scrollTo(0,0);
  } else {
    SUBMIT();
  }
}

function SUBMIT(){
  SHW('scr-submit');
  const correct = answers.filter((a,i)=> a === QS[i].a).length;
  const pct = Math.round((correct/15)*100);
  const pass = pct >= 60;

  // Build wrong questions list
  const wrongQs = [];
  answers.forEach((a,i)=>{
    if(a !== QS[i].a){
      wrongQs.push({
        num: i+1,
        q: QS[i].q,
        chosen: QS[i].o[a],
        correct: QS[i].o[QS[i].a]
      });
    }
  });

  const payload = {
    name: studentName,
    score: correct,
    total: 15,
    pct: pct,
    pass: pass,
    timestamp: new Date().toISOString(),
    answers: answers,
    wrongCount: wrongQs.length,
    wrongQuestions: wrongQs.map(w=>({num:w.num, q:w.q, chosen:w.chosen, correct:w.correct}))
  };

  // Save to Firebase
  function saveAndShow(){
    if(window._FB_READY && window._db){
      try {
        const dbRef = window._ref(window._db, 'quiz_results');
        const newRef = window._push(dbRef);
        window._set(newRef, payload).then(()=>{
          ShowResult(correct, pct, pass, wrongQs);
        }).catch(()=>{
          ShowResult(correct, pct, pass, wrongQs);
        });
      } catch(e){
        ShowResult(correct, pct, pass, wrongQs);
      }
    } else {
      // Firebase not configured yet — still show result
      setTimeout(()=>ShowResult(correct, pct, pass, wrongQs), 800);
    }
  }

  // Wait briefly for Firebase module to load if needed
  if(window._FB_READY){ saveAndShow(); }
  else { setTimeout(saveAndShow, 1500); }
}

function ShowResult(correct, pct, pass, wrongQs){
  SHW('scr-result');
  $('res-icon').textContent = pass ? '🎉' : '📖';
  $('res-score').textContent = correct + ' / 15';
  $('res-label').textContent = 'النتيجة: ' + AR(pct) + '%';
  $('res-badge').innerHTML = pass
    ? `<div class="pass-badge">✅ ناجح — أحسنت!</div>`
    : `<div class="fail-badge">❌ لم تتجاوز الحد الأدنى — راجع المواد وحاول مجدداً</div>`;

  if(wrongQs.length > 0){
    $('res-wrong-card').style.display = 'block';
    $('res-wrong-list').innerHTML = wrongQs.map(w=>
      `<div class="wrong-item">
        <strong>س${w.num}: ${w.q}</strong>
        إجابتك: ${w.chosen}<br>
        الصحيح: <span style="color:#1E8449;font-weight:700">${w.correct}</span>
      </div>`
    ).join('');
  }
}

// Arabic numerals helper
function AR(n){
  return String(n).replace(/\d/g, d=>'٠١٢٣٤٥٦٧٨٩'[d]);
}
</script>
